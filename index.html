<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Scientific Calculator</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="background-blobs" aria-hidden="true">
        <span class="blob blob-one"></span>
        <span class="blob blob-two"></span>
        <span class="blob blob-three"></span>
    </div>

    <main class="app-shell">
        <section class="calculator-card" id="calculatorCard" aria-label="Scientific calculator">
            <header class="calculator-top">
                <div>
                    <p class="brand-title">MODERN CALCULATOR</p>
                    <p class="brand-subtitle">Natural Textbook Display</p>
                </div>
                <button id="themeToggle" class="icon-toggle" type="button" aria-label="Toggle theme">☀</button>
            </header>

            <div class="solar-panel" aria-hidden="true"></div>

            <div class="display-shell" aria-live="polite">
                <div class="display-meta">
                    <span id="modeIndicator">DEG</span>
                    <span id="memoryIndicator">M:0</span>
                </div>
                <p id="expression" class="expression">0</p>
                <p id="display" class="display">0</p>
                <p id="statusLine" class="status-line">&nbsp;</p>
            </div>

            <div class="visual-row" aria-hidden="true">
                <button class="decor-btn shift">SHIFT</button>
                <button class="decor-btn alpha">ALPHA</button>
                <div class="replay-pad">
                    <span>REPLAY</span>
                </div>
                <button class="decor-btn muted">MODE</button>
                <button class="decor-btn muted">SETUP</button>
            </div>

            <div class="button-grid" id="buttonGrid">
                <button type="button" class="calc-btn small scientific" data-value="asin(">sin⁻¹</button>
                <button type="button" class="calc-btn small scientific" data-value="acos(">cos⁻¹</button>
                <button type="button" class="calc-btn small scientific" data-value="atan(">tan⁻¹</button>
                <button type="button" class="calc-btn small scientific" data-action="toggle-angle">DEG/RAD</button>
                <button type="button" class="calc-btn action orange" data-action="clear">AC</button>

                <button type="button" class="calc-btn small scientific" data-value="sinh(">sinh</button>
                <button type="button" class="calc-btn small scientific" data-value="cosh(">cosh</button>
                <button type="button" class="calc-btn small scientific" data-value="tanh(">tanh</button>
                <button type="button" class="calc-btn small scientific" data-value="abs(">abs</button>
                <button type="button" class="calc-btn action orange" data-action="delete">DEL</button>

                <button type="button" class="calc-btn small scientific" data-action="memory-clear">MC</button>
                <button type="button" class="calc-btn small scientific" data-action="memory-recall">MR</button>
                <button type="button" class="calc-btn small scientific" data-action="memory-plus">M+</button>
                <button type="button" class="calc-btn small scientific" data-action="memory-minus">M-</button>
                <button type="button" class="calc-btn small scientific" data-action="random">Ran#</button>

                <button type="button" class="calc-btn small scientific" data-value="(">(</button>
                <button type="button" class="calc-btn small scientific" data-value=")">)</button>
                <button type="button" class="calc-btn small scientific" data-value="n!">n!</button>
                <button type="button" class="calc-btn small scientific" data-value="%">%</button>
                <button type="button" class="calc-btn operator" data-value="/">÷</button>

                <button type="button" class="calc-btn small scientific" data-value="x^2">x²</button>
                <button type="button" class="calc-btn small scientific" data-value="x^3">x³</button>
                <button type="button" class="calc-btn small scientific" data-value="^">xʸ</button>
                <button type="button" class="calc-btn small scientific" data-value="sqrt(">√</button>
                <button type="button" class="calc-btn operator" data-value="*">×</button>

                <button type="button" class="calc-btn small scientific" data-value="cbrt(">∛x</button>
                <button type="button" class="calc-btn small scientific" data-value="1/x">1/x</button>
                <button type="button" class="calc-btn small scientific" data-value="log(">log</button>
                <button type="button" class="calc-btn small scientific" data-value="ln(">ln</button>
                <button type="button" class="calc-btn operator" data-value="-">−</button>

                <button type="button" class="calc-btn small scientific" data-value="sin(">sin</button>
                <button type="button" class="calc-btn small scientific" data-value="cos(">cos</button>
                <button type="button" class="calc-btn small scientific" data-value="tan(">tan</button>
                <button type="button" class="calc-btn small scientific" data-value="Exp">Exp</button>
                <button type="button" class="calc-btn operator" data-value="+">+</button>

                <button type="button" class="calc-btn digit" data-value="7">7</button>
                <button type="button" class="calc-btn digit" data-value="8">8</button>
                <button type="button" class="calc-btn digit" data-value="9">9</button>
                <button type="button" class="calc-btn scientific" data-value="pi">π</button>
                <button type="button" class="calc-btn scientific" data-value="e">e</button>

                <button type="button" class="calc-btn digit" data-value="4">4</button>
                <button type="button" class="calc-btn digit" data-value="5">5</button>
                <button type="button" class="calc-btn digit" data-value="6">6</button>
                <button type="button" class="calc-btn scientific" data-action="ans">Ans</button>
                <button type="button" class="calc-btn equals tall" data-action="equals">=</button>

                <button type="button" class="calc-btn digit" data-value="1">1</button>
                <button type="button" class="calc-btn digit" data-value="2">2</button>
                <button type="button" class="calc-btn digit" data-value="3">3</button>
                <button type="button" class="calc-btn scientific" data-value=".">.</button>

                <button type="button" class="calc-btn digit zero" data-value="0">0</button>
                <button type="button" class="calc-btn scientific" data-value="00">00</button>
            </div>
        </section>
    </main>

    <noscript>
        <p class="noscript">Please enable JavaScript to use the calculator.</p>
    </noscript>
    <script src="js/script.js"></script>
</body>
</html>
